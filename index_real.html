  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

le=\"opacity:0;\"><path d=\"M206,136 C202,108 210,80 220,66\" stroke=\"#4c9a3c\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M220,66 C214,54 200,52 198,62 C206,65 214,64 220,66Z\" fill=\"#5cae48\"><\u002Fpath><path d=\"M220,66 C226,54 240,54 242,64 C234,67 226,66 220,66Z\" fill=\"#5cae48\"><\u002Fpath><path d=\"M220,90 C214,78 200,77 199,86 C207,89 215,88 220,90Z\" fill=\"#469037\"><\u002Fpath><path d=\"M220,90 C226,78 238,79 239,87 C231,90 225,89 220,90Z\" fill=\"#469037\"><\u002Fpath><circle cx=\"268\" cy=\"96\" r=\"22\" fill=\"#bcd84e\"><\u002Fcircle><circle cx=\"268\" cy=\"96\" r=\"17\" fill=\"#a8c83e\"><\u002Fcircle><line x1=\"268\" y1=\"74\" x2=\"268\" y2=\"118\" stroke=\"#7f9a28\" stroke-width=\"1.6\"><\u002Fline><line x1=\"246\" y1=\"96\" x2=\"290\" y2=\"96\" stroke=\"#7f9a28\" stroke-width=\"1.6\"><\u002Fline><line x1=\"252\" y1=\"80\" x2=\"284\" y2=\"112\" stroke=\"#7f9a28\" stroke-width=\"1\"><\u002Fline><line x1=\"284\" y1=\"80\" x2=\"252\" y2=\"112\" stroke=\"#7f9a28\" stroke-width=\"1\"><\u002Fline><\u002Fg>\n        <g id=\"bbh-pour-7\" style=\"opacity:0;\"><path d=\"M198,140 C195,112 201,84 209,68\" stroke=\"#3f8a32\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M218,136 C215,108 221,82 229,66\" stroke=\"#4f9a42\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M238,140 C235,112 241,86 249,70\" stroke=\"#3f8a32\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M209,68 C203,58 195,58 194,66 C200,68 206,67 209,68Z\" fill=\"#5cae48\"><\u002Fpath><path d=\"M229,66 C223,56 215,56 214,64 C220,66 226,65 229,66Z\" fill=\"#4f9a42\"><\u002Fpath><circle cx=\"184\" cy=\"118\" r=\"3\" fill=\"#ecd089\"><\u002Fcircle><circle cx=\"262\" cy=\"110\" r=\"2.6\" fill=\"#ecd089\"><\u002Fcircle><circle cx=\"248\" cy=\"128\" r=\"3\" fill=\"#ecd089\"><\u002Fcircle><circle cx=\"208\" cy=\"124\" r=\"2.4\" fill=\"#ecd089\"><\u002Fcircle><\u002Fg>\n\n        <!-- GLASS POT (tuned for light bg) -->\n        <path d=\"M80,168 C80,156 380,156 380,168 L360,455 C357,492 320,498 312,498 L148,498 C140,498 103,492 100,455 Z\" fill=\"rgba(255,255,255,0.22)\" stroke=\"rgba(22,32,43,0.30)\" stroke-width=\"2.5\"><\u002Fpath>\n        <path d=\"M122,205 C113,300 116,400 130,452\" stroke=\"rgba(255,255,255,0.6)\" stroke-width=\"7\" fill=\"none\" stroke-linecap=\"round\" opacity=\"0.7\"><\u002Fpath>\n        <path d=\"M150,210 C144,300 146,400 156,448\" stroke=\"rgba(255,255,255,0.3)\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n        <path d=\"M344,210 C350,300 348,400 338,450\" stroke=\"rgba(22,32,43,0.12)\" stroke-width=\"4\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n        <path d=\"M80,250 C44,252 40,330 80,332\" stroke=\"rgba(22,32,43,0.26)\" stroke-width=\"12\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n        <path d=\"M80,250 C44,252 40,330 80,332\" stroke=\"rgba(255,255,255,0.5)\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n        <path d=\"M380,250 C416,252 420,330 380,332\" stroke=\"rgba(22,32,43,0.26)\" stroke-width=\"12\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n        <path d=\"M380,250 C416,252 420,330 380,332\" stroke=\"rgba(255,255,255,0.5)\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n        <ellipse cx=\"230\" cy=\"168\" rx=\"150\" ry=\"22\" fill=\"rgba(22,32,43,0.08)\"><\u002Fellipse>\n        <ellipse cx=\"230\" cy=\"168\" rx=\"150\" ry=\"22\" fill=\"none\" stroke=\"rgba(22,32,43,0.34)\" stroke-width=\"2.5\"><\u002Fellipse>\n        <ellipse cx=\"230\" cy=\"164\" rx=\"150\" ry=\"20\" fill=\"none\" stroke=\"rgba(255,255,255,0.65)\" stroke-width=\"2\"><\u002Fellipse>\n      <\u002Fsvg>\n    <\u002Fdiv>\n\n    <!-- panels overlap the sticky pot -->\n    <div class=\"bbh-steps\" style=\"position:relative; z-index:2; margin-top:-100vh; max-width:1260px; margin-left:auto; margin-right:auto;\">\n\n      <!-- INTRO -->\n      <div class=\"bbh-intro\" style=\"position:relative; min-height:100vh; display:flex; align-items:center; justify-content:flex-start; padding:0 2.6rem;\">\n        <div style=\"position:absolute; inset:0; pointer-events:none; background:linear-gradient(90deg, #eef1f6 0%, #eef1f6 34%, rgba(238,241,246,0.85) 50%, rgba(238,241,246,0) 78%);\"><\u002Fdiv>\n        <div style=\"position:relative; z-index:1; width:min(540px,94%);\">\n          <p style=\"font-size:0.74rem; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; color:#2766db; margin-bottom:1.4rem;\">Zelda Truong &nbsp;—&nbsp; Data scientist &amp; product manager<\u002Fp>\n          <h1 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:clamp(2.8rem,6.4vw,5.4rem); line-height:0.94; letter-spacing:-0.025em; margin-bottom:1.5rem;\">Half empty, or <span style=\"color:#f55a30;\">half full?<\u002Fspan><\u002Fh1>\n          <p style=\"font-size:1.08rem; color:#51606e; max-width:46ch; margin-bottom:1.1rem; text-wrap:pretty;\">Optimist, pessimist — you're both staring at the wrong container. It's a <em style=\"font-style:italic; color:#2766db;\">pot<\u002Fem>, that's plain water, and I'm about to cook it into <em style=\"font-style:italic; color:#2766db;\">Bún Bò Huế<\u002Fem> — my favourite dish.<\u002Fp>\n          <p style=\"font-size:1.08rem; color:#51606e; max-width:46ch; margin-bottom:2.4rem; text-wrap:pretty;\">I'm a data scientist and product manager. Every ingredient that drops in is a project, a place, or a part of me — scroll, and we cook until the bowl's done.<\u002Fp>\n          <div style=\"display:flex; align-items:center; gap:0.6rem; font-size:0.74rem; letter-spacing:0.18em; text-transform:uppercase; color:#5a6a78;\">\n            <span>Start the broth<\u002Fspan>\n            <svg width=\"13\" height=\"13\" viewBox=\"0 0 14 14\" fill=\"none\" style=\"animation:bbhBounce 2s ease-in-out infinite;\"><path d=\"M7 2v10M3 8l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- STEP 1 -->\n      <div class=\"bbh-step\" data-step=\"1\" style=\"min-height:96vh; display:flex; align-items:center; justify-content:flex-start; padding:0 2.6rem;\">\n        <div class=\"bbh-card\" style=\"opacity:0; transform:translateY(36px); width:min(396px,92%); background:#ffffff; border:1px solid rgba(22,32,43,0.08); border-top:4px solid #2766db; border-radius:4px; padding:1.9rem 1.9rem 2rem; box-shadow:0 24px 50px rgba(22,32,43,0.13);\">\n          <div style=\"display:flex; align-items:flex-start; gap:0.8rem; margin-bottom:1.1rem;\">\n            <span style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:2.7rem; line-height:0.78; color:#2766db;\">01<\u002Fspan>\n            <span style=\"font-size:0.68rem; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; color:#8593a0; padding-top:0.3rem;\">The base<\u002Fspan>\n          <\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:1.85rem; line-height:1.04; letter-spacing:-0.01em; margin-bottom:0.4rem;\">Water &amp; bones<\u002Fh2>\n          <p style=\"font-size:0.76rem; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:#f55a30; margin-bottom:0.9rem;\">Born &amp; raised in Hanoi<\u002Fp>\n          <p style=\"font-size:0.97rem; color:#51606e; text-wrap:pretty;\">Every broth starts with water and a bone that's been through it. Mine: Hanoi, Vietnam. That's the stock everything else simmers in.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- STEP 2 -->\n      <div class=\"bbh-step\" data-step=\"2\" style=\"min-height:96vh; display:flex; align-items:center; justify-content:flex-end; padding:0 2.6rem;\">\n        <div class=\"bbh-card\" style=\"opacity:0; transform:translateY(36px); width:min(396px,92%); background:#ffffff; border:1px solid rgba(22,32,43,0.08); border-top:4px solid #2766db; border-radius:4px; padding:1.9rem 1.9rem 2rem; box-shadow:0 24px 50px rgba(22,32,43,0.13);\">\n          <div style=\"display:flex; align-items:flex-start; gap:0.8rem; margin-bottom:1.1rem;\">\n            <span style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:2.7rem; line-height:0.78; color:#2766db;\">02<\u002Fspan>\n            <span style=\"font-size:0.68rem; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; color:#8593a0; padding-top:0.3rem;\">The aromatics<\u002Fspan>\n          <\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:1.85rem; line-height:1.04; letter-spacing:-0.01em; margin-bottom:0.4rem;\">Lemongrass &amp; shallots<\u002Fh2>\n          <p style=\"font-size:0.76rem; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:#f55a30; margin-bottom:0.9rem;\">Minerva University · 6 countries<\u002Fp>\n          <p style=\"font-size:0.97rem; color:#51606e; text-wrap:pretty;\">Then Minerva University sent me to live across six countries — Seoul, Berlin, Buenos Aires, Hyderabad, Taipei, San Francisco. Each one is somewhere in the smell of this.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- STEP 3 — PROJECT -->\n      <div class=\"bbh-step\" data-step=\"3\" style=\"min-height:96vh; display:flex; align-items:center; justify-content:flex-start; padding:0 2.6rem;\">\n        <div class=\"bbh-card\" style=\"opacity:0; transform:translateY(36px); width:min(420px,94%); background:#ffffff; border:1px solid rgba(39,102,219,0.28); border-top:4px solid #2766db; border-radius:4px; padding:1.9rem 1.9rem 2rem; box-shadow:0 24px 52px rgba(22,32,43,0.15);\">\n          <div style=\"display:flex; align-items:flex-start; gap:0.8rem; margin-bottom:1.1rem;\">\n            <span style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:2.7rem; line-height:0.78; color:#2766db;\">03<\u002Fspan>\n            <div style=\"padding-top:0.2rem;\">\n              <span style=\"display:inline-block; font-size:0.62rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:#ffffff; background:#2766db; padding:0.16rem 0.5rem; border-radius:3px; margin-bottom:0.35rem;\">Project<\u002Fspan>\n              <div style=\"font-size:0.68rem; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; color:#8593a0;\">The heat<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:1.85rem; line-height:1.04; letter-spacing:-0.01em; margin-bottom:0.4rem;\">Chili &amp; shrimp paste<\u002Fh2>\n          <p style=\"font-size:0.76rem; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:#f55a30; margin-bottom:0.9rem;\">Pink Tax · feminist data<\u002Fp>\n          <p style=\"font-size:0.97rem; color:#51606e; margin-bottom:1.1rem; text-wrap:pretty;\">A big part of my portfolio is projects — and this is where they get spicy. Women pay more for the same razor, the same shampoo, so I scraped 500+ products to build the proof. Then I found women also wait longer in the ER, and built that case too.<\u002Fp>\n          <div style=\"display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:1.2rem;\">\n            <span style=\"font-size:0.64rem; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:#5a6a78; border:1px solid rgba(22,32,43,0.16); padding:0.18rem 0.55rem; border-radius:3px;\">Python<\u002Fspan>\n            <span style=\"font-size:0.64rem; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:#5a6a78; border:1px solid rgba(22,32,43,0.16); padding:0.18rem 0.55rem; border-radius:3px;\">Data viz<\u002Fspan>\n            <span style=\"font-size:0.64rem; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:#5a6a78; border:1px solid rgba(22,32,43,0.16); padding:0.18rem 0.55rem; border-radius:3px;\">Feminism<\u002Fspan>\n          <\u002Fdiv>\n          <a href=\"https://github.com/zeldu18\" target=\"_blank\" style=\"display:inline-flex; align-items:center; gap:0.4rem; font-size:0.76rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:#16202b; text-decoration:none; border-bottom:1.5px solid #f55a30; padding-bottom:0.18rem;\">View project<svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 10L10 2M10 2H4M10 2v6\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- STEP 4 — PROJECT -->\n      <div class=\"bbh-step\" data-step=\"4\" style=\"min-height:96vh; display:flex; align-items:center; justify-content:flex-end; padding:0 2.6rem;\">\n        <div class=\"bbh-card\" style=\"opacity:0; transform:translateY(36px); width:min(420px,94%); background:#ffffff; border:1px solid rgba(39,102,219,0.28); border-top:4px solid #2766db; border-radius:4px; padding:1.9rem 1.9rem 2rem; box-shadow:0 24px 52px rgba(22,32,43,0.15);\">\n          <div style=\"display:flex; align-items:flex-start; gap:0.8rem; margin-bottom:1.1rem;\">\n            <span style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:2.7rem; line-height:0.78; color:#2766db;\">04<\u002Fspan>\n            <div style=\"padding-top:0.2rem;\">\n              <span style=\"display:inline-block; font-size:0.62rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:#ffffff; background:#2766db; padding:0.16rem 0.5rem; border-radius:3px; margin-bottom:0.35rem;\">Project<\u002Fspan>\n              <div style=\"font-size:0.68rem; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; color:#8593a0;\">The substance<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:1.85rem; line-height:1.04; letter-spacing:-0.01em; margin-bottom:0.4rem;\">Beef shank (bắp bò)<\u002Fh2>\n          <p style=\"font-size:0.76rem; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:#f55a30; margin-bottom:0.9rem;\">Stock Cycle, predicted by my period cycle<\u002Fp>\n          <p style=\"font-size:0.97rem; color:#51606e; margin-bottom:1.1rem; text-wrap:pretty;\">I treated the phases of my own menstrual cycle as a periodic feature and tested whether it added signal to a short-horizon model of stock movements. The cycle is rhythmic; markets have rhythms too — a genuine time-series experiment, and the feature held up out of sample.<\u002Fp>\n          <div style=\"display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:1.2rem;\">\n            <span style=\"font-size:0.64rem; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:#5a6a78; border:1px solid rgba(22,32,43,0.16); padding:0.18rem 0.55rem; border-radius:3px;\">ML<\u002Fspan>\n            <span style=\"font-size:0.64rem; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:#5a6a78; border:1px solid rgba(22,32,43,0.16); padding:0.18rem 0.55rem; border-radius:3px;\">Time series<\u002Fspan>\n            <span style=\"font-size:0.64rem; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:#5a6a78; border:1px solid rgba(22,32,43,0.16); padding:0.18rem 0.55rem; border-radius:3px;\">Python<\u002Fspan>\n          <\u002Fdiv>\n          <a href=\"https://github.com/zeldu18\" target=\"_blank\" style=\"display:inline-flex; align-items:center; gap:0.4rem; font-size:0.76rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:#16202b; text-decoration:none; border-bottom:1.5px solid #f55a30; padding-bottom:0.18rem;\">View project<svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 10L10 2M10 2H4M10 2v6\" stroke=\"currentColor\" stroke-width=\" ff; border:1.5px solid rgba(255,255,255,0.5);\">Say hi →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FULL MENU -->\n  <section id=\"menu\" data-screen-label=\"Projects\" style=\"position:relative; z-index:2; max-width:1200px; margin:0 auto; padding:6rem 2.6rem 2rem;\">\n    <p style=\"font-size:0.74rem; font-weight:600; letter-spacing:0.22em; text-transform:uppercase; color:#2766db; margin-bottom:0.8rem;\">The full menu<\u002Fp>\n    <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:clamp(2.4rem,5.5vw,3.8rem); line-height:0.96; letter-spacing:-0.025em; margin-bottom:0.7rem;\">Things I've <span style=\"color:#f55a30;\">actually built.<\u002Fspan><\u002Fh2>\n    <p style=\"font-size:1rem; color:#51606e; max-width:48ch; margin-bottom:2.8rem;\">Six dishes off the same stove — data science with a feminist streak and a soft spot for the unhinged.<\u002Fp>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); border-top:1px solid rgba(22,32,43,0.16); border-left:1px solid rgba(22,32,43,0.16);\">\n      <a class=\"bbh-proj\" href=\"https://github.com/zeldu18\" target=\"_blank\" style=\"position:relative; padding:1.9rem; border-right:1px solid rgba(22,32,43,0.16); border-bottom:1px solid rgba(22,32,43,0.16); text-decoration:none; color:inherit; display:flex; flex-direction:column; gap:0.7rem; transition:background 0.25s,color 0.25s;\">\n        <span class=\"pn\" style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:1.1rem; color:#2766db;\">01<\u002Fspan>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:1.4rem; line-height:1.08; color:#16202b;\">Pink Tax Comparison<\u002Fh3>\n        <p style=\"font-size:0.88rem; color:#51606e; line-height:1.6; flex:1;\">Scraped 500+ drugstore items to prove women pay more for identical products marketed in pink. Still not over it.<\u002Fp>\n        <span class=\"pl\" style=\"font-size:0.72rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:#16202b;\">View on GitHub ↗<\u002Fspan>\n      <\u002Fa>\n      <a class=\"bbh-proj\" href=\"https://github.com/zeldu18\" target=\"_blank\" style=\"position:relative; padding:1.9rem; border-right:1px solid rgba(22,32,43,0.16); border-bottom:1px solid rgba(22,32,43,0.16); text-decoration:none; color:inherit; display:flex; flex-direction:column; gap:0.7rem; transition:background 0.25s,color 0.25s;\">\n        <span class=\"pn\" style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:1.1rem; color:#2766db;\">02<\u002Fspan>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:1.4rem; line-height:1.08; color:#16202b;\">The Wait Gap<\u002Fh3>\n        <p style=\"font-size:0.88rem; color:#51606e; line-height:1.6; flex:1;\">An analysis of gender disparities in emergency-room wait times. The data is upsetting. That was the point.<\u002Fp>\n        <span class=\"pl\" style=\"font-size:0.72rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:#16202b;\">View on GitHub ↗<\u002Fspan>\n      <\u002Fa>\n      <a class=\"bbh-proj\" href=\"https://github.com/zeldu18\" target=\"_blank\" style=\"position:relative; padding:1.9rem; border-right:1px solid rgba(22,32,43,0.16); border-bottom:1px solid rgba(22,32,43,0.16); text-decoration:none; color:inherit; display:flex; flex-direction:column; gap:0.7rem; transition:background 0.25s,color 0.25s;\">\n        <span class=\"pn\" style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:1.1rem; color:#2766db;\">03<\u002Fspan>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:1.4rem; line-height:1.08; color:#16202b;\">Stock Cycle Prediction<\u002Fh3>\n        <p style=\"font-size:0.88rem; color:#51606e; line-height:1.6; flex:1;\">Tested my own cycle phases as a periodic feature in a short-horizon stock-movement model. A real time-series experiment — and it held up.<\u002Fp>\n        <span class=\"pl\" style=\"font-size:0.72rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:#16202b;\">View on GitHub ↗<\u002Fspan>\n      <\u002Fa>\n      <a class=\"bbh-proj\" href=\"https://github.com/zeldu18/Olympic-Medals-Forecast\" target=\"_blank\" style=\"position:relative; padding:1.9rem; border-right:1px solid rgba(22,32,43,0.16); border-bottom:1px solid rgba(22,32,43,0.16); text-decoration:none; color:inherit; display:flex; flex-direction:column; gap:0.7rem; transition:background 0.25s,color 0.25s;\">\n        <span class=\"pn\" style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:1.1rem; color:#2766db;\">04<\u002Fspan>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:1.4rem; line-height:1.08; color:#16202b;\">Olympic Medals Forecast<\u002Fh3>\n        <p style=\"font-size:0.88rem; color:#51606e; line-height:1.6; flex:1;\">A machine-learning model forecasting Olympic medal counts by country. Historical performance is a strong predictor. Shocking.<\u002Fp>\n        <span class=\"pl\" style=\"font-size:0.72rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:#16202b;\">View on GitHub ↗<\u002Fspan>\n      <\u002Fa>\n      <a class=\"bbh-proj\" href=\"https://github.com/zeldu18/Breast-Cancer-Prediction\" target=\"_blank\" style=\"position:relative; padding:1.9rem; border-right:1px solid rgba(22,32,43,0.16); border-bottom:1px solid rgba(22,32,43,0.16); text-decoration:none; color:inherit; display:flex; flex-direction:column; gap:0.7rem; transition:background 0.25s,color 0.25s;\">\n        <span class=\"pn\" style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:1.1rem; color:#2766db;\">05<\u002Fspan>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:1.4rem; line-height:1.08; color:#16202b;\">Breast Cancer Prediction<\u002Fh3>\n        <p style=\"font-size:0.88rem; color:#51606e; line-height:1.6; flex:1;\">A classification model for early detection using diagnostic imaging data. The kind of project where accuracy actually matters.<\u002Fp>\n        <span class=\"pl\" style=\"font-size:0.72rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:#16202b;\">View on GitHub ↗<\u002Fspan>\n      <\u002Fa>\n      <a class=\"bbh-proj\" href=\"https://github.com/zeldu18/From-Images-to-Emissions\" target=\"_blank\" style=\"position:relative; padding:1.9rem; border-right:1px solid rgba(22,32,43,0.16); border-bottom:1px solid rgba(22,32,43,0.16); text-decoration:none; color:inherit; display:flex; flex-direction:column; gap:0.7rem; transition:background 0.25s,color 0.25s;\">\n        <span class=\"pn\" style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:1.1rem; color:#2766db;\">06<\u002Fspan>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:1.4rem; line-height:1.08; color:#16202b;\">From Images to Emissions<\u002Fh3>\n        <p style=\"font-size:0.88rem; color:#51606e; line-height:1.6; flex:1;\">Satellite imagery + computer vision to estimate carbon emissions from land use. Data for a problem that needs more of it.<\u002Fp>\n        <span class=\"pl\" style=\"font-size:0.72rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:#16202b;\">View on GitHub ↗<\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"position:relative; z-index:2; max-width:1200px; margin:0 auto; padding:3.2rem 2.6rem 5rem; display:flex; flex-wrap:wrap; gap:1.2rem; align-items:center; justify-content:space-between;\">\n    <span style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:1.35rem; color:#16202b;\">Zelda Truong<\u002Fspan>\n    <div style=\"display:flex; gap:1.4rem; flex-wrap:wrap;\">\n      <a href=\"https://github.com/zeldu18\" target=\"_blank\" style=\"font-size:0.76rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#5a6a78; text-decoration:none; border-bottom:1.5px solid rgba(22,32,43,0.2); padding-bottom:2px;\">GitHub ↗<\u002Fa>\n      <a href=\"https://www.linkedin.com/in/zelda-truong\" target=\"_blank\" style=\"font-size:0.76rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#5a6a78; text-decoration:none; border-bottom:1.5px solid rgba(22,32,43,0.2); padding-bottom:2px;\">LinkedIn ↗<\u002Fa>\n      <a href=\"mailto:zeldatr1804@gmail.com\" style=\"font-size:0.76rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#5a6a78; text-decoration:none; border-bottom:1.5px solid rgba(22,32,43,0.2); padding-bottom:2px;\">Say hi →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;pourSpeed&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:1,&quot;min&quot;:0.4,&quot;max&quot;:2,&quot;step&quot;:0.1,&quot;unit&quot;:&quot;x&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Motion&quot;},&quot;steam&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;}}\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    this._tries = 0;\n    this._poll = setInterval(() => {\n      const root = document.getElementById('bbh-root');\n      const steps = root ? root.querySelectorAll('.bbh-step') : [];\n      if (window.gsap && window.ScrollTrigger && steps.length >= 7) {\n        clearInterval(this._poll); this._poll = null;\n        this.setupCooking();\n      } else if (this._tries++ > 200) {\n        clearInterval(this._poll); this._poll = null;\n        (root ? root.querySelectorAll('.bbh-card') : []).forEach(c => { c.style.opacity = '1'; c.style.transform = 'none'; });\n      }\n    }, 50);\n  }\n  componentWillUnmount() { if (this._poll) clearInterval(this._poll); }\n\n  setupCooking() {\n    const gsap = window.gsap;\n    gsap.registerPlugin(window.ScrollTrigger);\n    if (this._triggers) { this._triggers.forEach(t => t.kill()); }\n    this._triggers = [];\n\n    const speed = this.props.pourSpeed ?? 1;\n    const steamOn = this.props.steam !== false;\n    const d = (n) => n / speed;\n\n    const INIT = { y: 330, a: '#aac8d8', b: '#86abc2' };\n    const cfg = [\n      { y: 304, a: '#c8a85c', b: '#9c8038', side: 'left'  },\n      { y: 280, a: '#d07a2c', b: '#a85a1c', side: 'right' },\n      { y: 256, a: '#e0501f', b: '#a83414', side: 'left'  },\n      { y: 236, a: '#cf4419', b: '#8f2c0e', side: 'right' },\n      { y: 220, a: '#c23c14', b: '#86270b', side: 'left'  },\n      { y: 206, a: '#b6360f', b: '#7c2208', side: 'right' },\n      { y: 196, a: '#ac3009', b: '#741d05', side: 'center'}\n    ];\n\n    const root = document.getElementById('bbh-root');\n    if (!root) return;\n    const liq  = root.querySelector('#bbhLiquidRect');\n    const surf = root.querySelector('#bbhLiquidSurf');\n    const liqA = root.querySelector('#bbhLiqA');\n    const liqB = root.querySelector('#bbhLiqB');\n    const steam = root.querySelector('#bbh-steam');\n\n    const setLevel = (st, dur) => {\n      gsap.to(liq,  { attr: { y: st.y }, duration: d(dur), ease: 'power2.out' });\n      gsap.to(surf, { attr: { cy: st.y }, duration: d(dur), ease: 'power2.out' });\n      gsap.to(liqA, { stopColor: st.a, duration: d(dur) });\n      gsap.to(liqB, { stopColor: st.b, duration: d(dur) });\n    };\n\n    gsap.set(liq, { attr: { y: INIT.y } });\n    gsap.set(surf, { attr: { cy: INIT.y } });\n\n    root.querySelectorAll('.bbh-step').forEach((stepEl, i) => {\n      const c = cfg[i];\n      const card  = stepEl.querySelector('.bbh-card');\n      const pour  = root.querySelector('#bbh-pour-' + (i + 1));\n      const settle = root.querySelector('#bbh-settle-' + (i + 1));\n      gsap.set(pour, { opacity: 0 });\n      gsap.set(settle, { opacity: 0 });\n      const dir = c.side === 'left' ? -1 : (c.side === 'right' ? 1 : 0);\n\n      this._triggers.push(window.ScrollTrigger.create({\n        trigger: stepEl,\n        start: 'top 62%',\n        onEnter: () => {\n          gsap.to(card, { opacity: 1, y: 0, duration: d(0.6), ease: 'power2.out' });\n          setLevel(c, 1.2);\n          if (steamOn) gsap.to(steam, { opacity: 1, duration: d(0.8) });\n          const sx = dir === 0 ? (Math.random() < 0.5 ? -1 : 1) : dir;\n          gsap.killTweensOf(pour);\n          gsap.fromTo(pour,\n            { opacity: 0, x: sx * 360, y: -300, rotation: sx * 40, scale: 0.78, transformOrigin: '50% 50%' },\n            { opacity: 1, x: 0, y: 0, rotation: 0, scale: 1, duration: d(0.85), ease: 'power2.in',\n              onComplete: () => { gsap.to(pour, { y: 80, opacity: 0, scale: 0.5, duration: d(0.55), delay: d(0.1), ease: 'power1.in' }); }\n            });\n          gsap.to(settle, { opacity: 1, duration: d(0.8), delay: d(0.7) });\n        },\n        onLeaveBack: () => {\n          gsap.to(card, { opacity: 0, y: 36, duration: d(0.4), ease: 'power1.in' });\n          gsap.killTweensOf(pour);\n          gsap.to(pour, { opacity: 0, duration: d(0.3) });\n          gsap.to(settle, { opacity: 0, duration: d(0.3) });\n          if (i > 0) setLevel(cfg[i - 1], 0.8);\n          else {\n            setLevel(INIT, 0.8);\n            if (steamOn) gsap.to(steam, { opacity: 0, duration: d(0.5) });\n          }\n        }\n      }));\n    });\n\n    root.querySelectorAll('.bbh-proj').forEach((a) => {\n      a.addEventListener('mouseenter', () => {\n        a.style.background = '#2766db';\n        a.querySelector('h3').style.color = '#ffffff';\n        a.querySelector('p').style.color = 'rgba(255,255,255,0.85)';\n        a.querySelector('.pn').style.color = '#ffffff';\n        a.querySelector('.pl').style.color = '#ffffff';\n      });\n      a.addEventListener('mouseleave', () => {\n        a.style.background = 'transparent';\n        a.querySelector('h3').style.color = '#16202b';\n        a.querySelector('p').style.color = '#51606e';\n        a.querySelector('.pn').style.color = '#2766db';\n        a.querySelector('.pl').style.color = '#16202b';\n      });\n    });\n\n    window.ScrollTrigger.refresh();\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
